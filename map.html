<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    map.html — INDOOR MAP NAVIGATION PAGE  (v3)

    Key improvements:
      ✅ Directions derived from actual path coordinates (getDirection)
      ✅ Voice speaks correct turn-by-turn in English / Telugu / Hindi
      ✅ Language dropdown updates both display text AND voice
      ✅ Wheelchair mode uses ramp path with correct ramp voice cue
      ✅ Step list shows all waypoints with their auto-detected directions
      ✅ "Repeat" button re-speaks the current step in current language
      ✅ Clean 2-column layout: canvas left, instructions right
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Indoor Navigation — City General Hospital</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Two-column layout: map left, instructions right ── */
    .map-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    @media(max-width: 820px) { .map-layout { grid-template-columns: 1fr; } }

    /* ── Destination header banner ── */
    .dest-header {
      background: linear-gradient(90deg, #1a6fb5, #0d5a99);
      color: #fff;
      border-radius: 14px;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .dest-icon { font-size: 34px; flex-shrink: 0; }
    .dest-name {
      font-family: 'Poppins', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }
    .dest-sub  { font-size: 13px; opacity: 0.8; margin-top: 2px; }

    /* Wheelchair badge in header */
    .wc-badge {
      margin-left: auto;
      background: rgba(0,168,120,0.3);
      border: 1px solid rgba(0,168,120,0.5);
      color: #fff;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Floor selector tabs ── */
    .floor-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .floor-tab {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .floor-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── Canvas wrapper (needed for arrived overlay) ── */
    .canvas-wrap { position: relative; }
    .canvas-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .canvas-overlay.show { opacity: 1; }
    .arrived-box {
      background: rgba(0,168,120,0.93);
      color: #fff;
      padding: 18px 32px;
      border-radius: 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 28px rgba(0,0,0,0.22);
    }
    .arrived-box .arrived-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.9;
    }

    /* ── Current instruction box (big, coloured) ── */
    .curr-instr {
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      transition: background 0.4s;
      min-height: 64px;
    }
    .curr-icon { font-size: 28px; flex-shrink: 0; }

    /* ── Step list ── */
    .steps-list { display: flex; flex-direction: column; gap: 7px; }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f7f9fc;
      border: 1.5px solid transparent;
      font-size: 14px;
      transition: all 0.2s;
    }
    .step-row.active {
      background: #edf6ff;
      border-color: var(--primary);
    }
    .step-row.done {
      background: #f0fff9;
      border-color: #a3e9cf;
      opacity: 0.75;
    }
    .step-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-num.active { background: var(--primary); color: #fff; }
    .step-num.done   { background: var(--secondary); color: #fff; }

    .step-icon { font-size: 18px; flex-shrink: 0; }
    .step-text { line-height: 1.4; color: var(--text); }
    .step-sub  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Language selector (inside instruction panel) ── */
    .lang-card {
      background: #f0f8ff;
      border: 1.5px solid #bee3f8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 12px;
    }
    .lang-card label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }
    .lang-card select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .lang-card select:focus { border-color: var(--primary); }

    /* ── Voice control row ── */
    .voice-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    /* ── Progress bar ── */
    .prog-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    /* ── Map legend ── */
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink:0; }

    /* Direction icon mapping → used in JS */
  </style>
</head>
<body>

<!-- ============================================================
     TOP NAVIGATION BAR
     ============================================================ -->
<nav class="topbar">
  <a href="index.html" class="logo">
    <img src="logo.jpeg" alt="Hospital Logo" class="logo-img">
    <span>City General Hospital</span>
  </a>

      Topbar language selector:

    <select class="lang-select" id="langSelect" onchange="onLangChange(this.value)">
      <option value="en">🌐 English</option>

</nav>

<!-- ============================================================
     PAGE CONTENT
     ============================================================ -->
<div class="page-wrap">

  <!-- Back link -->
  <a href="#" onclick="goBack(); return false;" class="back-link">← Go Back</a>

  <!-- ── Destination header (filled by JS) ── -->
  <div class="dest-header" id="destHeader">
    <div class="dest-icon" id="destIcon">📍</div>
    <div>
      <div class="dest-name" id="destName">Loading…</div>
      <div class="dest-sub"  id="destSub">Please wait</div>
    </div>
    <div class="wc-badge" id="wcBadge" style="display:none;">♿ Accessible Route</div>
  </div>

  <!-- ── Main layout: map left + instructions right ── -->
  <div class="map-layout">

    <!-- ══ LEFT: Map Canvas ══ -->
    <div>
      <!-- Floor selector tabs -->
      <div class="floor-tabs">
        <button class="floor-tab active" id="floorTab1" onclick="switchFloor(1)">Floor 1</button>
        <button class="floor-tab"        id="floorTab2" onclick="switchFloor(2)">Floor 2</button>
        <button class="floor-tab"        id="floorTab3" onclick="switchFloor(3)">Floor 3</button>
      </div>

      <!-- Canvas + "You Have Arrived" overlay -->
      <div class="canvas-wrap">
        <canvas id="mapCanvas" width="800" height="450"></canvas>

        <!-- Arrival overlay (shown when navigation completes) -->
        <div class="canvas-overlay" id="arrivedOverlay">
          <div class="arrived-box">
            <div>✅ <span id="arrivedText">You Have Arrived!</span></div>
            <div class="arrived-sub" id="arrivedSub">Navigation complete</div>
          </div>
        </div>
      </div><!-- /.canvas-wrap -->

      <!-- Map legend -->
      <div class="map-legend">
        <div class="legend-item"><div class="leg-dot" style="background:#1a6fb5;"></div> Your position</div>
        <div class="legend-item"><div class="leg-dot" style="background:#00a878;"></div> Path taken</div>
        <div class="legend-item"><div class="leg-dot" style="background:#e63946;"></div> Destination</div>
        <div class="legend-item"><div class="leg-dot" style="background:rgba(26,111,181,0.2); border:1px solid #ccc;"></div> Planned route</div>
      </div>
    </div><!-- /left -->

    <!-- ══ RIGHT: Instructions Panel ══ -->
    <div>
      <div class="card" style="padding:20px;">

        <div class="card-title">🧭 Turn-by-Turn Directions</div>

        <!-- Progress bar -->
        <div class="prog-label">
          <span>Progress</span>
          <span id="progLabel">0%</span>
        </div>
        <div class="nav-progress">
          <div class="nav-progress-fill" id="progFill" style="width:0%;"></div>
        </div>

        <!--
          Current step box — shows the ACTIVE instruction in large text.
          Background colour changes:
            Blue  = navigating
            Green = arrived
        -->
        <div class="curr-instr" id="currInstr">
          <div class="curr-icon" id="currIcon">🚶</div>
          <div id="currText">Starting navigation…</div>
        </div>

        <!-- All steps list (built by JS) -->
        <div class="steps-list" id="stepsList"></div>

        <!-- Voice controls -->
        <div class="voice-row">
          <button class="btn btn-secondary btn-sm" onclick="repeatCurrentStep()">
            🔊 Repeat
          </button>
          <button class="btn btn-outline btn-sm" onclick="stopSpeaking()">
            🔇 Mute
          </button>
        </div>
        <!-- Test voice button — helps on mobile where audio needs user gesture -->
        <button class="btn btn-outline btn-block" style="margin-top:8px; font-size:13px;" onclick="testVoice()" id="testVoiceBtn">
          🎙️ Test Voice (tap to enable audio)
        </button>

        <!--
          Language selector inside the panel.
          Synced with the topbar dropdown.
          Changing here updates voice AND re-renders step text.
        -->
        <div class="lang-card">
          <label>🌐 Voice Language</label>
          <select id="panelLangSelect" class="lang-sel" onchange="onLangChange(this.value)">
            <option value="en">🌐 English</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="hi">हिन्दी (Hindi)</option>
          </select>
        </div>

        <!-- Restart button -->
        <button class="btn btn-outline btn-block" style="margin-top:12px;" onclick="restartNav()">
          🔄 Restart Navigation
        </button>

        <!-- Links back -->
        <div style="margin-top:14px; text-align:center; font-size:13px; color:var(--text-muted);">
          <a href="patient-search.html" style="color:var(--primary); font-weight:700; text-decoration:none;">
            ← Search Patient
          </a>
          &nbsp;·&nbsp;
          <a href="department.html" style="color:var(--primary); font-weight:700; text-decoration:none;">
            Departments →
          </a>
        </div>

      </div><!-- /.card -->

      <!-- Accessibility info card -->
      <div class="card" style="background:#edf6ff; border:1px solid #bee3f8; padding:16px; margin-top:0;">
        <div style="font-size:13px; color:#1a4e7a; line-height:1.7;" id="accessInfo"></div>
      </div>

    </div><!-- /right -->
  </div><!-- /.map-layout -->

</div><!-- /.page-wrap -->

<!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
<script>
/* ============================================================
   MAP PAGE SCRIPT
   ──────────────────────────────────────────────────────────
   Flow:
     1. Read navigation target from sessionStorage
     2. buildPath() → array of {x, y, dirKey} waypoints
        where dirKey comes from getDirection(prev, next)
     3. renderStepsList() → build the right-panel step list
     4. startAnimation() → requestAnimationFrame loop
     5. At each waypoint: onWaypointReached(i)
        → tr(dirKey, lang) → get translated phrase
        → speak(phrase, lang) → play voice
        → highlight active step in UI
   ============================================================ */

/* ── State ── */
let target      = null;   // navigation target from sessionStorage
let waypoints   = [];     // built by buildPath()
let currentWP   = 0;      // index of the waypoint we just announced
let animProg    = 0;      // fractional progress: 0 → waypoints.length-1
let animRunning = false;
let animFrame   = null;
let currentFloor = 1;

/* Canvas */
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');
const CW     = canvas.width;
const CH     = canvas.height;

/* ── Direction key → emoji icon mapping (for display only) ── */
const DIR_ICONS = {
  start:    '🚪',
  straight: '⬆️',
  left:     '↩️',
  right:    '↪️',
  back:     '↩',
  lift:     '🛗',
  ramp:     '♿',
  reached:  '✅',
};

/* ══════════════════════════════════════════════════════════
   INITIALISE — called on page load
   ══════════════════════════════════════════════════════════ */
(function init() {
  applyStoredLang();         // restore language preference to all selectors
  updateTopbarStaff();       // show staff name or login button

  // Read target saved by patient-search.html or department.html
  target = getNavTarget();
  if (!target) {
    alert('No navigation target found. Please search for a patient or department first.');
    window.history.back();
    return;
  }

  // ── Apply language ──
  const lang = target.lang || getCurrentLang();
  syncAllLangSelectors(lang);
  saveLang(lang);

  // ── Fill destination header ──
  const isPatient = target.type === 'patient';
  document.getElementById('destIcon').textContent = isPatient ? '🛏️' : '🏥';
  document.getElementById('destName').textContent =
    isPatient ? `${target.name} — Room ${target.room}` : target.name;
  document.getElementById('destSub').textContent =
    `Floor ${target.floor}` + (isPatient ? ` · ${target.dept}` : ' · Department');

  // Show wheelchair badge if applicable
  if (target.wheelchair) {
    document.getElementById('wcBadge').style.display = 'inline';
  }

  // ── Accessibility info ──
  document.getElementById('accessInfo').innerHTML = target.wheelchair
    ? '♿ <strong>Wheelchair Mode:</strong> Route uses ramps and lifts only. No stairs. Follow ♿ signs.'
    : 'ℹ️ Standard route. Lifts are shown as 🛗 on the map.';

  // ── Show destination floor ──
  currentFloor = target.floor || 1;
  updateFloorTabs(currentFloor);

  // ── Build waypoints using coordinate-based direction detection ──
  //
  // buildPath() calls getDirection(prevPoint, nextPoint) for each segment.
  // This means the direction key ('straight', 'left', 'right' …) is
  // automatically determined from the actual x,y coordinates —
  // no manual labelling needed.
  //
  waypoints = buildPath(target.destX, target.destY, target.floor, target.wheelchair);

  // ── Draw initial map ──
  drawFloorMap(ctx, currentFloor, CW, CH);
  drawPath(ctx, waypoints, 0);

  // ── Build step list UI ──
  renderStepsList();

  // ── Start speaking first instruction after a short delay ──
  setTimeout(() => {
    onWaypointReached(0, () => { _waitingForVoice = false; });
    startAnimation();
  }, 1000);
})();

/* ══════════════════════════════════════════════════════════
   ANIMATION LOOP
   Uses requestAnimationFrame for smooth movement.
   Speed: 0.011 progress units per frame ≈ ~3–4 s per step
          at 60 fps.
   ══════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════
   ANIMATION LOOP — Voice-Synced
   The dot moves smoothly between waypoints.
   At each waypoint it PAUSES until the voice finishes,
   then resumes. This eliminates lag between voice and map.

   SPEED_PER_FRAME: pixels of progress per frame at 60fps.
   Tune this to control how fast the dot moves between steps.
   ══════════════════════════════════════════════════════════ */

const SPEED_PER_FRAME = 0.006;  // ~5s to cross one step segment

// Extra state for voice-sync pause
let _waitingForVoice = false;
let _voiceDoneTimer  = null;

function startAnimation() {
  animRunning      = true;
  animProg         = 0;
  currentWP        = 0;
  _waitingForVoice = false;
  animFrame        = requestAnimationFrame(animLoop);
}

function animLoop() {
  if (!animRunning) return;

  const total = waypoints.length - 1;

  // If we're paused waiting for voice, just redraw and wait
  if (!_waitingForVoice) {
    animProg += SPEED_PER_FRAME;

    if (animProg >= total) {
      animProg    = total;
      animRunning = false;
      drawFloorMap(ctx, currentFloor, CW, CH);
      drawPath(ctx, waypoints, animProg);
      onArrived();
      return;
    }

    // Check if we just crossed a waypoint boundary
    const wpIdx = Math.floor(animProg);
    if (wpIdx !== currentWP && wpIdx < waypoints.length) {
      currentWP        = wpIdx;
      _waitingForVoice = true;   // pause dot movement

      // Speak the instruction — resume dot after voice ends
      onWaypointReached(wpIdx, () => {
        _waitingForVoice = false;  // voice done → resume dot
      });
    }
  }

  // Redraw every frame regardless (keeps dot smooth during movement)
  drawFloorMap(ctx, currentFloor, CW, CH);
  drawPath(ctx, waypoints, animProg);

  // Update progress bar
  const pct = Math.round((animProg / total) * 100);
  document.getElementById('progFill').style.width  = pct + '%';
  document.getElementById('progLabel').textContent = pct + '%';

  if (animRunning) animFrame = requestAnimationFrame(animLoop);
}

/* ══════════════════════════════════════════════════════════
   WAYPOINT REACHED
   This is the core of the voice guidance system.

   When the dot arrives at waypoint[i]:
     1. Get the dirKey stored in waypoints[i]
     2. Translate it using tr(dirKey, lang)
     3. Speak it using speak(text, lang)
     4. Update the current-step UI box
     5. Highlight the active row in the step list
   ══════════════════════════════════════════════════════════ */

/**
 * onWaypointReached(idx)
 * Called when the animated dot reaches waypoints[idx].
 *
 * Example flow for a left-turn waypoint:
 *   waypoints[2].dirKey = 'left'   (set by getDirection)
 *   lang = 'te'
 *   tr('left', 'te') = 'ఎడమవైపు తిరగండి'
 *   speak('ఎడమవైపు తిరగండి', 'te')  → browser speaks in Telugu
 */
/**
 * onWaypointReached(idx, onDone)
 * Called when the animated dot reaches waypoints[idx].
 * @param {number}   idx    — waypoint index
 * @param {Function} onDone — called when voice finishes (to resume dot)
 */
function onWaypointReached(idx, onDone) {
  const wp   = waypoints[idx];
  if (!wp) { if (onDone) onDone(); return; }

  const lang   = getCurrentLang();
  const dirKey = wp.dirKey;

  // Build a richer contextual message for key waypoints
  let text = tr(dirKey, lang);

  // For the last step, personalise with destination name
  if (dirKey === 'reached' && target) {
    const dest = target.type === 'patient'
      ? tr('reached_patient', lang)
          .replace('{name}', target.name || '')
          .replace('{room}', target.room || '')
      : tr('reached_dept', lang)
          .replace('{name}', target.name || '');
    if (dest && dest !== 'reached_patient' && dest !== 'reached_dept') text = dest;
  }

  // For lift/ramp, add floor info
  if ((dirKey === 'lift' || dirKey === 'ramp') && target) {
    const floorMsg = tr('to_floor', lang).replace('{floor}', target.floor);
    if (floorMsg && floorMsg !== 'to_floor') text = text + '. ' + floorMsg;
  }

  // ── Update the big current-instruction box ──
  document.getElementById('currIcon').textContent = DIR_ICONS[dirKey] || '•';
  document.getElementById('currText').textContent = text;

  // ── Speak the instruction, then call onDone ──
  speakWithCallback(text, lang, onDone);

  // ── Update step list highlighting ──
  document.querySelectorAll('.step-row').forEach((row, i) => {
    row.classList.remove('active', 'done');
    if (i < idx)  row.classList.add('done');
    if (i === idx) row.classList.add('active');
  });
  document.querySelectorAll('.step-num').forEach((num, i) => {
    num.classList.remove('active', 'done');
    if (i < idx)  num.classList.add('done');
    if (i === idx) num.classList.add('active');
  });

  // Scroll active step into view
  const activeRow = document.getElementById(`stepRow-${idx}`);
  if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ══════════════════════════════════════════════════════════
   ARRIVED
   ══════════════════════════════════════════════════════════ */

function onArrived() {
  const lang   = getCurrentLang();
  const text   = tr('reached', lang);

  // ── Update current instruction box (turn green) ──
  document.getElementById('currInstr').style.background = '#00a878';
  document.getElementById('currIcon').textContent       = '✅';
  document.getElementById('currText').textContent       = text;

  // ── Show canvas overlay ──
  document.getElementById('arrivedText').textContent = text;
  document.getElementById('arrivedSub').textContent  =
    target.name ? `${target.name}` : 'Navigation complete';
  document.getElementById('arrivedOverlay').classList.add('show');

  // ── Progress to 100% ──
  document.getElementById('progFill').style.width  = '100%';
  document.getElementById('progLabel').textContent = '100%';

  // ── Mark all steps done ──
  document.querySelectorAll('.step-row').forEach(r => r.classList.add('done'));
  document.querySelectorAll('.step-num').forEach(n => n.classList.add('done'));

  // ── Speak arrival ──
  speak(text, lang);
}

/* ══════════════════════════════════════════════════════════
   STEP LIST RENDERING
   Build the right-panel list of all steps with icons and text.
   ══════════════════════════════════════════════════════════ */

/**
 * renderStepsList()
 * Reads waypoints[] and builds the HTML list.
 * Each row shows:
 *   • Numbered badge (1, 2, 3 …)
 *   • Direction emoji icon
 *   • Translated instruction text in the current language
 *   • Small sub-text showing the raw direction key
 */
function renderStepsList() {
  const lang = getCurrentLang();
  const list = document.getElementById('stepsList');

  list.innerHTML = waypoints.map((wp, i) => {
    const icon = DIR_ICONS[wp.dirKey] || '•';
    const text = tr(wp.dirKey, lang);

    return `
      <div class="step-row" id="stepRow-${i}">
        <span class="step-num" id="stepNum-${i}">${i + 1}</span>
        <span class="step-icon">${icon}</span>
        <div class="step-text">
          ${text}
          <div class="step-sub">Step ${i + 1} of ${waypoints.length}</div>
        </div>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   LANGUAGE CHANGE
   When user picks a new language from either dropdown:
     1. Save preference
     2. Sync all selectors on the page
     3. Re-render steps in new language
     4. Re-speak the current active step
   ══════════════════════════════════════════════════════════ */

/**
 * onLangChange(lang)
 * Called by both the topbar dropdown and the panel dropdown.
 * @param {string} lang — 'en', 'te', or 'hi'
 */
function onLangChange(lang) {
  saveLang(lang);
  syncAllLangSelectors(lang);

  // Stop any ongoing speech in old language
  stopSpeaking();

  // Re-render steps in new language
  renderStepsList();

  // Re-highlight and re-speak the current active step in new language
  onWaypointReached(currentWP, null);

  // Scroll active step into view on mobile
  const activeRow = document.getElementById(`stepRow-${currentWP}`);
  if (activeRow) activeRow.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

/** Keep both language dropdowns in sync */
function syncAllLangSelectors(lang) {
  document.querySelectorAll('#langSelect, #panelLangSelect, .lang-sel').forEach(sel => {
    sel.value = lang;
  });
}

/* ══════════════════════════════════════════════════════════
   VOICE CONTROLS
   ══════════════════════════════════════════════════════════ */

/**
 * repeatCurrentStep()
 * Re-speak the current direction in the current language.
 * Useful if the user missed the announcement.
 */
function repeatCurrentStep() {
  const wp   = waypoints[currentWP];
  if (!wp) return;
  const lang = getCurrentLang();
  const text = tr(wp.dirKey, lang);
  speak(text, lang);
}

/* ══════════════════════════════════════════════════════════
   RESTART & FLOOR SWITCH
   ══════════════════════════════════════════════════════════ */

function restartNav() {
  if (animFrame) cancelAnimationFrame(animFrame);
  stopSpeaking();
  animRunning      = false;
  _waitingForVoice = false;

  // Reset state
  currentWP = 0;
  animProg  = 0;

  // Reset UI
  document.getElementById('arrivedOverlay').classList.remove('show');
  document.getElementById('currInstr').style.background = '';
  document.getElementById('progFill').style.width  = '0%';
  document.getElementById('progLabel').textContent = '0%';
  document.querySelectorAll('.step-row').forEach(r => r.classList.remove('active','done'));
  document.querySelectorAll('.step-num').forEach(n => n.classList.remove('active','done'));

  // Redraw
  drawFloorMap(ctx, currentFloor, CW, CH);
  drawPath(ctx, waypoints, 0);

  // Restart
  setTimeout(() => {
    onWaypointReached(0, () => { _waitingForVoice = false; });
    startAnimation();
  }, 400);
}

function switchFloor(floor) {
  currentFloor = floor;
  updateFloorTabs(floor);
  drawFloorMap(ctx, floor, CW, CH);
  drawPath(ctx, waypoints, animProg);
}

function updateFloorTabs(floor) {
  [1, 2, 3].forEach(f => {
    const btn = document.getElementById(`floorTab${f}`);
    if (btn) btn.classList.toggle('active', f === floor);
  });
}

/** Go back to whichever page sent us here */
function goBack() {
  stopSpeaking();
  window.location.href = (target && target.type === 'patient')
    ? 'patient-search.html'
    : 'department.html';
}

/**
 * testVoice()
 * Lets user trigger a test speech — important on mobile where
 * Web Speech API requires a user gesture before it will play.
 */
function testVoice() {
  const lang = getCurrentLang();
  const msgs = {
    en: 'Voice navigation is ready. I will guide you to your destination.',
    te: 'వాయిస్ నావిగేషన్ సిద్ధంగా ఉంది. నేను మీకు గమ్యస్థానానికి మార్గం చూపిస్తాను.',
    hi: 'वॉइस नेविगेशन तैयार है। मैं आपको आपके गंतव्य तक पहुंचाऊंगा।',
  };
  speak(msgs[lang] || msgs.en, lang);
  // Hide the test button after first use
  const btn = document.getElementById('testVoiceBtn');
  if (btn) {
    btn.textContent = '✅ Voice Active';
    btn.style.background = '#d4f5e9';
    btn.style.borderColor = '#00a878';
    btn.style.color = '#096640';
  }
}
</script>
